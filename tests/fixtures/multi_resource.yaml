openapi: "3.0.3"
info:
  title: Multi-resource test fixture
  description: >
    Minimal fixture with two independent resource paths (pets and owners)
    to verify that routes/api.php emits one `use` import per controller
    and deduplicates when the same controller handles multiple verbs.
  version: "1.0.0"

servers:
  - url: https://example.test/api

paths:
  /pets:
    get:
      operationId: listPets
      tags: [pets]
      summary: List pets
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Pet"
    post:
      operationId: createPet
      tags: [pets]
      summary: Create pet
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Pet"
      responses:
        "201":
          description: Created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Pet"

  /owners:
    get:
      operationId: listOwners
      tags: [owners]
      summary: List owners
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Owner"

components:
  schemas:
    Pet:
      type: object
      required: [name]
      properties:
        name:
          type: string
    Owner:
      type: object
      required: [name]
      properties:
        name:
          type: string
