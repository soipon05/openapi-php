openapi: "3.1.0"
info:
  title: OAS 3.1 Nullable Test
  version: "1.0.0"
servers:
  - url: https://example.com/v1
paths:
  /items/{id}:
    get:
      operationId: getItem
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: OK
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Item'
components:
  schemas:
    Item:
      type: object
      required: [id, name]
      properties:
        id:
          type: integer
        name:
          type: string
        description:
          type: ["string", "null"]
        score:
          type: ["number", "null"]
        rating:
          type: ["integer", "null"]
