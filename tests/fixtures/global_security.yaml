openapi: "3.0.3"
info:
  title: "Security Test"
  version: "1.0.0"
security:
  - ApiKeyAuth: []
paths:
  /secure:
    get:
      operationId: getSecure
      responses:
        "200":
          description: ok
  /public:
    get:
      operationId: getPublic
      security: []  # explicitly no auth
      responses:
        "200":
          description: ok
components:
  securitySchemes:
    ApiKeyAuth:
      type: apiKey
      in: header
      name: X-API-Key
