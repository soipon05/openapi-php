openapi: "3.0.3"
info:
  title: Form Urlencoded API
  version: "1.0.0"
servers:
  - url: https://api.example.com
paths:
  /login:
    post:
      operationId: login
      summary: Log in
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        "204":
          description: Logged in
components:
  schemas:
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
        password:
          type: string
