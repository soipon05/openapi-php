name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust (stable + clippy)
        uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      # Cache ~/.cargo/registry, ~/.cargo/git, and target/ keyed on Cargo.lock
      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2

      - name: Build (release)
        run: cargo build --release

      - name: Run tests
        run: cargo test

      - name: Clippy (deny warnings)
        run: cargo clippy -- -D warnings

      # ── PHP validation ──────────────────────────────────────────────────────

      - name: Install PHP 8.2
        uses: shivammathur/setup-php@v2
        with:
          php-version: "8.2"

      # Validate all PHP files already committed in examples/.
      # `find examples -name "*.php"` picks up new directories automatically.
      - name: Syntax-check committed examples
        run: find examples -name "*.php" -print0 | xargs -0 php -l | grep -v "No syntax errors" || true

      # Also generate fresh output from every fixture and re-validate, so a
      # generator regression is caught even if the committed examples are stale.
      - name: Generate and validate — simple (plain PHP)
        run: |
          ./target/release/openapi-php generate \
            --input  examples/simple/openapi.yaml \
            --output /tmp/gen/simple \
            --namespace "App\\Generated"
          find /tmp/gen/simple -name "*.php" -print0 | xargs -0 php -l | grep -v "No syntax errors" || true

      - name: Generate and validate — simple (Laravel)
        run: |
          ./target/release/openapi-php generate \
            --input     examples/simple/openapi.yaml \
            --output    /tmp/gen/simple-laravel \
            --namespace "App\\Generated" \
            --framework laravel
          find /tmp/gen/simple-laravel -name "*.php" -print0 | xargs -0 php -l | grep -v "No syntax errors" || true

      - name: Generate and validate — petstore (plain PHP)
        run: |
          ./target/release/openapi-php generate \
            --input  examples/petstore/openapi.yaml \
            --output /tmp/gen/petstore \
            --namespace "App\\Petstore"
          find /tmp/gen/petstore -name "*.php" -print0 | xargs -0 php -l | grep -v "No syntax errors" || true

      - name: Generate and validate — petstore (plain PHP, split-by-tag)
        run: |
          ./target/release/openapi-php generate \
            --input        examples/petstore/openapi.yaml \
            --output       /tmp/gen/petstore-split \
            --namespace    "App\\Petstore" \
            --split-by-tag
          find /tmp/gen/petstore-split -name "*.php" -print0 | xargs -0 php -l | grep -v "No syntax errors" || true

      - name: Generate and validate — petstore (Laravel)
        run: |
          ./target/release/openapi-php generate \
            --input     examples/petstore/openapi.yaml \
            --output    /tmp/gen/petstore-laravel \
            --namespace "App\\Petstore" \
            --framework laravel
          find /tmp/gen/petstore-laravel -name "*.php" -print0 | xargs -0 php -l | grep -v "No syntax errors" || true

      - name: Generate and validate — discriminated-union (plain PHP)
        run: |
          ./target/release/openapi-php generate \
            --input  examples/discriminated-union/openapi.yaml \
            --output /tmp/gen/discriminated-union \
            --namespace "App\\Example"
          find /tmp/gen/discriminated-union -name "*.php" -print0 | xargs -0 php -l | grep -v "No syntax errors" || true

      - name: Generate and validate — discriminated-union (Laravel)
        run: |
          ./target/release/openapi-php generate \
            --input     examples/discriminated-union/openapi.yaml \
            --output    /tmp/gen/discriminated-union-laravel \
            --namespace "App\\Generated" \
            --framework laravel
          find /tmp/gen/discriminated-union-laravel -name "*.php" -print0 | xargs -0 php -l | grep -v "No syntax errors" || true

      # ── PHPStan level 9 + strict-rules on generated plain-PHP output ────────
      # The strongest quality claim we make: every plain-PHP tree we generate
      # passes PHPStan at max level with strict-rules enabled, with no
      # silencers, stubs, or `@phpstan-ignore` comments anywhere in the output.
      # Laravel output depends on a bootstrapped Laravel environment to resolve
      # framework classes (FormRequest, Resource, Route) and is intentionally
      # out of scope for this gate — users type-check it inside their own app.

      - name: Cache composer dependencies
        uses: actions/cache@v4
        with:
          path: scripts/.phpstan-workspace/vendor
          key: ${{ runner.os }}-phpstan-${{ hashFiles('scripts/composer.json') }}

      - name: PHPStan level 9 (generated plain PHP + split + union)
        run: |
          ./scripts/phpstan-check.sh \
            /tmp/gen/simple \
            /tmp/gen/petstore \
            /tmp/gen/petstore-split \
            /tmp/gen/discriminated-union
