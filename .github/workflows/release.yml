name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build ${{ matrix.target }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64-unknown-linux-musl
            os: ubuntu-latest
            asset_name: openapi-php-linux-x86_64
          - target: aarch64-unknown-linux-musl
            os: ubuntu-latest
            asset_name: openapi-php-linux-aarch64
          - target: x86_64-apple-darwin
            os: macos-latest
            asset_name: openapi-php-macos-x86_64
          - target: aarch64-apple-darwin
            os: macos-latest
            asset_name: openapi-php-macos-aarch64
          - target: x86_64-pc-windows-msvc
            os: windows-latest
            asset_name: openapi-php-windows-x86_64.exe

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Install Rust (stable)
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}

      - name: Cache Rust build artefacts
        uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      # musl toolchain for static Linux binaries
      - name: Install musl-tools (Linux musl)
        if: contains(matrix.target, 'linux-musl')
        run: sudo apt-get install -y musl-tools

      # Cross-compile aarch64 Linux via cross
      - name: Install cross (aarch64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cargo install cross --locked

      - name: Build (cross — aarch64 Linux)
        if: matrix.target == 'aarch64-unknown-linux-musl'
        run: cross build --release --target ${{ matrix.target }}

      - name: Build (cargo — all others)
        if: matrix.target != 'aarch64-unknown-linux-musl'
        run: cargo build --release --target ${{ matrix.target }}

      # ── Rename binary ────────────────────────────────────────────────────────

      - name: Rename binary (Unix)
        if: runner.os != 'Windows'
        run: |
          cp target/${{ matrix.target }}/release/openapi-php \
             ${{ matrix.asset_name }}

      - name: Rename binary (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          Copy-Item "target\${{ matrix.target }}\release\openapi-php.exe" `
                    "${{ matrix.asset_name }}"

      # ── Upload to GitHub Release ─────────────────────────────────────────────

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ matrix.asset_name }}
          generate_release_notes: true
